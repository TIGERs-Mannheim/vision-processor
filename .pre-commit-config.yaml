repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^wrapper_backend/
      - id: ruff-format
        files: ^wrapper_backend/
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        files: ^wrapper_backend/
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: npm --prefix wrapper-frontend run lint
        language: system
        files: ^wrapper-frontend/
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npm --prefix wrapper-frontend run format:check
        language: system
        files: ^wrapper-frontend/
        pass_filenames: false
